name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest

    env:
      HUSKY: 0

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install root dependencies
      run: npm install

    - name: Install client dependencies
      run: npm install --prefix client

    - name: Install server dependencies
      run: npm install --prefix server

    - name: Lint (client)
      run: npm run lint --prefix client

    - name: Type Check (server)
      run: npx tsc --noEmit --project server/tsconfig.json

    - name: Type Check (client)
      run: npx tsc --noEmit --project client/tsconfig.app.json

    - name: Sync Database Schema (Test DB)
      run: cd server && npx drizzle-kit push --config=drizzle.config.ts --force
      env:
        HUSKY: 0

    - name: Test (server)
      run: npm run test --prefix server

    - name: Test (client)
      run: npm run test --prefix client

    - name: Build (client)
      run: npm run build --prefix client

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run E2E Tests
      run: npm run test:e2e
      env:
        BASE_URL: ${{ vars.STAGING_URL || 'http://127.0.0.1:4173' }}

name: Label Release Issues

on:
  release:
    types: [published]

jobs:
  label-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Label issues linked to the release
        uses: actions/github-script@v7
        with:
          script: |
            const release = context.payload.release;
            const releaseTag = release.tag_name;
            const body = release.body || '';
            
            // リリースノート内の PR 番号 (#42 形式) を抽出
            const prNumbers = [...body.matchAll(/#(\d+)/g)].map(match => parseInt(match[1]));
            
            if (prNumbers.length === 0) {
              console.log('No PR references found in release body.');
              return;
            }

            for (const prNumber of prNumbers) {
              try {
                // PR に紐づく Issue を取得 (Closing keyword で紐づいているもの)
                // note: PR 自体のラベルも付与したい場合はここで prNumber に対して操作
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                });
                
                // PR にラベルを付与
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: [releaseTag]
                });

                // PR 説明欄から Issue を探す (より確実にするため)
                const linkedIssues = [...(pr.body || '').matchAll(/#(\d+)/g)].map(match => parseInt(match[1]));
                
                for (const issueNumber of linkedIssues) {
                  if (issueNumber === prNumber) continue;
                  
                  console.log(`Labeling Issue #${issueNumber} with ${releaseTag}`);
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    labels: [releaseTag]
                  });
                }
              } catch (e) {
                console.error(`Error processing PR #${prNumber}:`, e.message);
              }
            }

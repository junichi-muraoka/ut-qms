name: 🛠 開発タスク (Task)
description: 実装設計と検証計画（エビデンス添付）を統合した詳細タスク
title: "[Category] Task Title"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🎯 目的 / 背景
        [このタスクで解決したい課題やビジョンを記述]

  - type: textarea
    id: implementation-design
    attributes:
      label: 🛠 実装設計 (Implementation Design)
      description: テーブル定義、カラム名、データ型、外部キー制約、ロジックの詳細を記述
      placeholder: "- テーブル名: xxx\n- カラム: yyy (integer)\n- ロジック: zzz..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## 📊 検証項目 & 合否判定 (Unit / E2E / Progress)

        | No. | 種別 | 検証項目 | 判定基準（「正しい」の定義） | 提出エビデンス | 🔍 完了 |
        | :--- | :--- | :--- | :--- | :--- | :--: |
        | **01** | **Unit** | **[検証対象]** | [何が起きれば正解か] | [どのログ/画像を添付するか] | `[ ]` |

  - type: textarea
    id: dod
    attributes:
      label: ✅ 最終完了条件 (Definition of Done)
      value: |
        - [ ] 実装が上記設計と 100% 一致していること。
        - [ ] 全ての検証項目で「🔍 完了」チェックが埋まっていること。
        - [ ] 各チェックに対応するエビデンスが、Issue コメントに漏れなく添付されていること。
    validations:
      required: true

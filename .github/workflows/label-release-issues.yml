name: Label Issues on Release

on:
  release:
    types: [published]

jobs:
  label-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Label linked issues with version
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.payload.release.tag_name;
            const body = context.payload.release.body || '';
            
            // Extract PR numbers from the release body (e.g. #123)
            const prMatches = body.match(/#(\d+)/g) || [];
            const prNumbers = prMatches.map(m => parseInt(m.replace('#', '')));
            
            console.log(`Found PRs: ${prNumbers}`);
            
            const linkedIssues = new Set();
            
            for (const prNumber of prNumbers) {
              try {
                // Get linked issues for each PR
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });
                
                // Check for linked issues in the PR description
                const issueMatches = pr.body ? pr.body.match(/#(\d+)/g) : [];
                issueMatches.forEach(m => linkedIssues.add(parseInt(m.replace('#', ''))));
              } catch (e) {
                console.log(`Could not find PR #${prNumber}: ${e.message}`);
              }
            }
            
            console.log(`Found linked issues: ${Array.from(linkedIssues)}`);
            
            // Create the label if it doesn't exist
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: tag,
                color: '0052cc', // Professional Blue
                description: `Released in ${tag}`
              });
            } catch (e) {
              console.log(`Label ${tag} might already exist: ${e.message}`);
            }
            
            // Label each linked issue
            for (const issueNumber of linkedIssues) {
              // Skip if the "issue" is actually a PR we already processed
              if (prNumbers.includes(issueNumber)) continue;
              
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: [tag]
                });
                console.log(`Labeled issue #${issueNumber} with ${tag}`);
              } catch (e) {
                console.log(`Could not label issue #${issueNumber}: ${e.message}`);
              }
            }
